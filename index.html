<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enzo | Frutiger Aero Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Capa de Fondo Acuático con Burbujas -->
    <div class="water-background">
        <canvas id="bubble-canvas"></canvas>
    </div>

    <!-- Contenedor Principal (Ventana de Reproductor) -->
    <div class="media-player-window">

        <!-- Header de la ventana estilo SO de los 2000 -->
        <div class="window-header">
            <div class="window-title">
                <span class="music-icon">🎵</span> Enzo_Portfolio_Player.exe
            </div>
            <div class="window-controls">
                <button class="win-btn minimize" aria-label="Minimizar"></button>
                <button class="win-btn maximize" aria-label="Maximizar"></button>
                <button class="win-btn close" aria-label="Cerrar"></button>
            </div>
        </div>

        <!-- Área de Pantalla -->
        <div class="screen-area">
            <!-- Efecto de brillo de la pantalla -->
            <div class="screen-glare"></div>
            <div id="screen-content">
                <!-- El contenido de JS se inyecta aquí -->
            </div>
        </div>

        <!-- Controles y Botones (Glossy bar) -->
        <div class="glass-nav-bar">
            <button class="glossy-btn active" data-target="home">
                <span class="icon">▶</span> <span class="btn-text">Inicio</span>
            </button>
            <button class="glossy-btn" data-target="projects">
                <span class="icon">■</span> <span class="btn-text">Proyectos</span>
            </button>
            <button class="glossy-btn" data-target="contact">
                <span class="icon">●</span> <span class="btn-text">Contacto</span>
            </button>
        </div>

    </div>

    <script src="js/script.js"></script>
</body>

</html>
